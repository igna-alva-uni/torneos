server:
  port: 9008
  forward-headers-strategy: framework
  error:
    include-stacktrace: never

spring:
  application:
    name: ms-ranking

  kafka:
    bootstrap-servers: ${KAFKA_SERV:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5433/torneos}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:123}   
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        defaultSchema: ranking
  
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERV:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
    instance-id: "${spring.application.name}:${random.value}"
    lease-renewal-interval-in-seconds: 15
    lease-expiration-duration-in-seconds: 60

springdoc:
  api-docs:
    path: /ranking/v3/api-docs
  swagger-ui:
    path: /ranking/swager
    disable-redirect: true

