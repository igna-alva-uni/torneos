spring:
  application:
    name: ms-inscripciones
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database: h2
    properties:
      hibernate:
        default_schema:
  kafka:
    listener:
      auto-startup: false
    bootstrap-servers: localhost:9092

eureka:
  client:
    enabled: false
